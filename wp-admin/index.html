<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &lsaquo; WordPress</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f1f1f1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Login box positioned absolutely so we can move it around */
        #login-container {
            width: 320px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: top 0.15s ease-out, left 0.15s ease-out;
        }

        .wp-logo {
            display: block;
            margin: 0 auto 25px;
            width: 84px;
            height: 84px;
            background-image: url('https://s.w.org/style/images/about/WordPress-logotype-wmark.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .wp-card {
            background: #fff;
            border: 1px solid #c3c4c7;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
            padding: 26px 24px 46px;
            border-radius: 4px;
        }

        .wp-card label {
            font-size: 14px;
        }

        .wp-card input {
            font-size: 24px;
            border: 1px solid #8c8f94;
            border-radius: 4px;
        }

        .wp-card .btn-login {
            background: #2271b1;
            color: #fff;
            border: 1px solid #2271b1;
            border-radius: 3px;
            padding: 4px 12px;
            font-size: 13px;
        }

        /* Fake hacking terminal */
        #terminal-screen {
            display: none;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 30px;
            height: 100vh;
            box-sizing: border-box;
            font-size: 1.2rem;
            line-height: 1.6;
            overflow-y: auto;
        }

        .cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-container">
        <a href="#" class="wp-logo"></a>
        <div class="wp-card">
            <form onsubmit="return false;">
                <div class="mb-3">
                    <label for="user_login" class="form-label">Username or Email Address</label>
                    <input type="text" class="form-control" id="user_login" name="log" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label for="user_pass" class="form-label">Password</label>
                    <input type="password" class="form-control" id="user_pass" name="pwd" autocomplete="off">
                </div>
                <div class="d-flex justify-content-end mt-3">
                    <button type="button" class="btn btn-login" id="fake-login-btn">Log In</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Fake terminal shown after clicking Log In or pressing Enter -->
    <div id="terminal-screen"></div>

    <script>
        const loginContainer = document.getElementById('login-container');
        const terminalScreen = document.getElementById('terminal-screen');

        let isHacking = false;

        // Move the login box to a random position on the screen
        function moveBox() {
            if (isHacking) return;

            const boxWidth = loginContainer.offsetWidth;
            const boxHeight = loginContainer.offsetHeight;
            const randomLeft = Math.floor(Math.random() * (window.innerWidth - boxWidth));
            const randomTop = Math.floor(Math.random() * (window.innerHeight - boxHeight));

            // Disable the centering transform once the box starts moving
            loginContainer.style.transform = 'none';
            loginContainer.style.left = randomLeft + 'px';
            loginContainer.style.top = randomTop + 'px';
        }

        // Escape on mouse hover or touch
        loginContainer.addEventListener('mouseenter', moveBox);
        loginContainer.addEventListener('touchstart', moveBox, { passive: true });

        // Trigger the fake terminal when Enter is pressed
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !isHacking) {
                event.preventDefault();
                startTerminal();
            }
        });

        // Also trigger on button click
        document.getElementById('fake-login-btn').addEventListener('click', startTerminal);

        function startTerminal() {
            if (isHacking) return;
            isHacking = true;

            loginContainer.style.display = 'none';
            document.body.style.background = '#000';
            terminalScreen.style.display = 'block';

            const lines = [
                "Initiating active defense protocol...",
                "Analyzing attacker vulnerabilities...",
                "Target IP detected. Executing reverse connection...",
                "Local firewall bypass: SUCCESS.",
                "Accessing device webcam... stream acquired.",
                "Downloading browser history (decrypting incognito mode)...",
                "Compromising files found: 42.",
                "Preparing mass broadcast to all WhatsApp and email contacts...",
                "Upload complete. Operation finished.",
                "Have a great day. ;)"
            ];

            let delay = 500;

            lines.forEach((line, index) => {
                setTimeout(() => {
                    const p = document.createElement('div');
                    if (index === lines.length - 1) {
                        p.innerHTML = '> ' + line + "<span class='cursor'></span>";
                    } else {
                        p.textContent = '> ' + line;
                    }
                    terminalScreen.appendChild(p);
                    window.scrollTo(0, document.body.scrollHeight);
                }, delay);

                delay += 1000 + Math.random() * 1500;
            });
        }
    </script>
</body>
</html>
