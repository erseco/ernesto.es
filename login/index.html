<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/admin-decoy.css">
    <style>
        body {
            background: #f4f6f9;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Login card positioned absolutely so we can move it around */
        #login-container {
            width: 360px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: top 0.15s ease-out, left 0.15s ease-out;
        }

        .login-card {
            background: #fff;
            border-radius: 8px;
            padding: 40px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .login-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            color: #333;
        }

        .login-card .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }

        .login-card .btn-login {
            background: #4361ee;
            border: none;
            width: 100%;
            padding: 10px;
            font-weight: 600;
            color: #fff;
            border-radius: 6px;
        }

        .login-card .btn-login:hover {
            background: #3046c5;
            color: #fff;
        }

    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to continue</p>
            <form onsubmit="return false;">
                <div class="mb-3">
                    <label for="login_email" class="form-label">Email address</label>
                    <input type="text" class="form-control" id="login_email" name="email" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label for="login_password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="login_password" name="password" autocomplete="off">
                </div>
                <div class="mt-4">
                    <button type="button" class="btn btn-login" id="fake-login-btn">Sign In</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Fake terminal shown after clicking Sign In or pressing Enter -->
    <div id="terminal-screen"></div>

    <script src="/js/admin-decoy.js"></script>
</body>
</html>
