<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f4f6f9;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Login card positioned absolutely so we can move it around */
        #login-container {
            width: 360px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: top 0.15s ease-out, left 0.15s ease-out;
        }

        .login-card {
            background: #fff;
            border-radius: 8px;
            padding: 40px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .login-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            color: #333;
        }

        .login-card .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }

        .login-card .btn-login {
            background: #4361ee;
            border: none;
            width: 100%;
            padding: 10px;
            font-weight: 600;
            color: #fff;
            border-radius: 6px;
        }

        .login-card .btn-login:hover {
            background: #3046c5;
            color: #fff;
        }

        /* Fake hacking terminal */
        #terminal-screen {
            display: none;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 30px;
            height: 100vh;
            box-sizing: border-box;
            font-size: 1.2rem;
            line-height: 1.6;
            overflow-y: auto;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
        }

        .cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to continue</p>
            <form onsubmit="return false;">
                <div class="mb-3">
                    <label for="login_email" class="form-label">Email address</label>
                    <input type="text" class="form-control" id="login_email" name="email" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label for="login_password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="login_password" name="password" autocomplete="off">
                </div>
                <div class="mt-4">
                    <button type="button" class="btn btn-login" id="fake-login-btn">Sign In</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Fake terminal shown after clicking Sign In or pressing Enter -->
    <div id="terminal-screen"></div>

    <script>
        const loginContainer = document.getElementById('login-container');
        const terminalScreen = document.getElementById('terminal-screen');

        let isHacking = false;

        // Move the login box to a random position on the screen
        function moveBox() {
            if (isHacking) return;

            const boxWidth = loginContainer.offsetWidth;
            const boxHeight = loginContainer.offsetHeight;
            const randomLeft = Math.floor(Math.random() * (window.innerWidth - boxWidth));
            const randomTop = Math.floor(Math.random() * (window.innerHeight - boxHeight));

            // Disable the centering transform once the box starts moving
            loginContainer.style.transform = 'none';
            loginContainer.style.left = randomLeft + 'px';
            loginContainer.style.top = randomTop + 'px';
        }

        // Escape on mouse hover or touch
        loginContainer.addEventListener('mouseenter', moveBox);
        loginContainer.addEventListener('touchstart', moveBox, { passive: true });

        // Trigger the fake terminal when Enter is pressed
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !isHacking) {
                event.preventDefault();
                startTerminal();
            }
        });

        // Also trigger on button click
        document.getElementById('fake-login-btn').addEventListener('click', startTerminal);

        function startTerminal() {
            if (isHacking) return;
            isHacking = true;

            loginContainer.style.display = 'none';
            document.body.style.background = '#000';
            terminalScreen.style.display = 'block';

            const lines = [
                "Initiating active defense protocol...",
                "Analyzing attacker vulnerabilities...",
                "Target IP detected. Executing reverse connection...",
                "Local firewall bypass: SUCCESS.",
                "Accessing device webcam... stream acquired.",
                "Downloading browser history (decrypting incognito mode)...",
                "Compromising files found: 42.",
                "Preparing mass broadcast to all WhatsApp and email contacts...",
                "Upload complete. Operation finished.",
                "Have a great day. ;)"
            ];

            let delay = 500;

            lines.forEach((line, index) => {
                setTimeout(() => {
                    const p = document.createElement('div');
                    if (index === lines.length - 1) {
                        p.innerHTML = '> ' + line + "<span class='cursor'></span>";
                    } else {
                        p.textContent = '> ' + line;
                    }
                    terminalScreen.appendChild(p);
                    window.scrollTo(0, document.body.scrollHeight);
                }, delay);

                delay += 1000 + Math.random() * 1500;
            });
        }
    </script>
</body>
</html>
